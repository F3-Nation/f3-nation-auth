# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  cpu: 1
  memoryMiB: 512
  maxInstances: 4

# Environment variables and secrets.
env:
  - variable: DB_CONNECTION_MODE
    secret: provider-db-connection-mode
    availability:
      - BUILD
      - RUNTIME
  - variable: DB_SCHEMA
    secret: provider-db-schema
    availability:
      - BUILD
      - RUNTIME
  - variable: DATABASE_URL
    secret: provider-database-url
    availability:
      - BUILD
      - RUNTIME
  - variable: CLOUD_SQL_CONNECTION_NAME
    secret: provider-cloud-sql-connection-name
    availability:
      - BUILD
      - RUNTIME
  - variable: DB_USER
    secret: provider-db-user
    availability:
      - BUILD
      - RUNTIME
  - variable: DB_PASSWORD
    secret: provider-db-password
    availability:
      - BUILD
      - RUNTIME
  - variable: DB_NAME
    secret: provider-db-name
    availability:
      - BUILD
      - RUNTIME
  - variable: CLOUD_SQL_IP_TYPE
    secret: provider-cloud-sql-ip-type
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXTAUTH_SECRET
    secret: provider-nextauth-secret
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXTAUTH_URL
    secret: provider-nextauth-url
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_NEXTAUTH_URL
    secret: provider-next-public-nextauth-url
    availability:
      - BUILD
      - RUNTIME
  - variable: TWILIO_SENDGRID_API_KEY
    secret: provider-twilio-sendgrid-api-key
    availability:
      - BUILD
      - RUNTIME
  - variable: TWILIO_SENDGRID_TEMPLATE_ID
    secret: provider-twilio-sendgrid-template-id
    availability:
      - BUILD
      - RUNTIME
  - variable: EMAIL_VERIFICATION_SENDER
    secret: provider-email-verification-sender
    availability:
      - BUILD
      - RUNTIME
  - variable: NODE_ENV
    secret: provider-node-env
    availability:
      - BUILD
      - RUNTIME
